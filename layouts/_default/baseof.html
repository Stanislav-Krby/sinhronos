<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ .Title }}</title>

    {{ partial "head.html" . }}
    {{ block "head" . }}{{ end }}
  </head>

  <body class="{{ if .IsHome }}is-home{{ end }}">
    {{ partial "header.html" . }}

    {{ if .IsHome }}
    <div class="tagbar">
      <a class="tag is-active" href="#" data-tag="all">ALL</a>
      <a class="tag" href="#" data-tag="cinematic">CINEMATIC</a>
      <a class="tag" href="#" data-tag="design">DESIGN</a>
      <a class="tag" href="#" data-tag="song">SONG</a>
      <a class="tag" href="#" data-tag="stage">STAGE</a>
    </div>
    {{ end }}

    <main>
      {{ block "main" . }}{{ end }}
    </main>

    {{ if .IsHome }}
   <script>
(function () {
  const gallery = document.getElementById("gallerydeluxe");
  if (!gallery) return;

  function norm(s){ return String(s || "").trim().toLowerCase(); }

  function applyPigFilter(selected) {
    const GD = window.__GD;
    if (!GD || !GD.pig || !GD.allImages || !GD.images) return;

    const pig = GD.pig;
    const allPI = GD.allImages; // ProgressiveImage[]
    const items = GD.images;    // raw json items

    // filename -> tags[]
    const tagsByFilename = new Map();
    items.forEach((it) => {
      const tags = [norm(it.tag1), norm(it.tag2), norm(it.tag3)].filter(Boolean);
      tagsByFilename.set(it.name, tags);
    });

    // allowed filenames
    const allowed = new Set();
    if (selected === "all") {
      items.forEach((it) => allowed.add(it.name));
    } else {
      items.forEach((it) => {
        const tags = tagsByFilename.get(it.name) || [];
        if (tags.includes(selected)) allowed.add(it.name);
      });
    }

    // hide removed images immediately (если уже в DOM)
    allPI.forEach((pi) => {
      if (!allowed.has(pi.filename) && pi.existsOnPage) {
        pi.hide();
      }
    });

    // swap pig.images to only allowed
    pig.images = allPI.filter((pi) => allowed.has(pi.filename));

    // recompute + relayout
    pig._computeLayout();
    pig._doLayout();

    // captions in GD обновляются на resize
    window.dispatchEvent(new Event("resize"));
  }

  // wait until GalleryDeluxe created pig
  let attempts = 0;
  const t = setInterval(() => {
    attempts++;
    if (window.__GD && window.__GD.pig && window.__GD.allImages && window.__GD.images) {
      clearInterval(t);

      // bind clicks
      document.querySelectorAll(".tagbar .tag").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.preventDefault();

          document.querySelectorAll(".tagbar .tag")
            .forEach((x) => x.classList.remove("is-active"));
          btn.classList.add("is-active");

          const selected = (btn.dataset.tag || "all").toLowerCase();
          applyPigFilter(selected);
        });
      });

      // initial
      applyPigFilter("all");
    }

    if (attempts > 300) clearInterval(t);
  }, 50);

})();
</script>
    {{ end }}

  </body>
</html>
